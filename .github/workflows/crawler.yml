name: Daily Crawler

on:
  schedule:
    # 呢度設定定時任務 (UTC 時間)，例如每日香港時間朝早 8 點 (UTC 00:00)
    - cron: '0 0 * * *'  
  workflow_dispatch: # 俾你可以手動按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run crawler
      run: |
        python scrape_mocom.py  # 換成你嘅檔名
    

    - name: Commit and Push if DB changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update DB" && git push)
    
    - name: Upload logs
      uses: actions/upload-artifact@v4
      with:
        name: trade-logs
        path: china_trade.log